services:
  - type: web
    name: trademind-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn trademind.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TRADEMIND_DEBUG
        value: "false"
      - key: TRADEMIND_DATABASE_URL
        value: "sqlite+aiosqlite:///./trademind.db"
    healthCheckPath: /health
    autoDeploy: true
